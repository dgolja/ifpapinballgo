# This overlay patches the official IFPA OpenAPI spec (ifpapinball-official-api.yaml)
# to produce a modified version (ifpapinball-official-api.modified.yaml) suitable for
# static language code generation.
#
# The official spec has two categories of issues:
#   1. Structural errors: several fields that return JSON arrays are declared as
#      `type: object` instead of `type: array`, which breaks Go code generation
#      (e.g. tournaments, pvp, results, rankings, country_directors, rank_history).
#   2. Missing type annotations: numeric fields that the API returns as strings
#      (or a mix of both) lack the x-go-type extensions needed to generate correct
#      Go types (types.StringInt, types.StringFloat64, types.StringBool, etc.).
#
# Apply this overlay with: make apply-overlay
overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Overlay ifpapinball-official-api.yaml => ifpapinball-official-api.modified.yaml
  version: 0.0.0
