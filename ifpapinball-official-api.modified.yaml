    /player/{id}/results/{ranking_system}/{type}:
        get:
            tags:
                - player
            summary: Get tournament results for a player
            description: Returns tournament results for a player based on the ranking system provided (main, women, youth)
            operationId: viewPlayerActiveResults
            parameters:
                - name: id
                  in: path
                  description: ID of the player
                  required: true
                  schema:
                    type: number
                - name: ranking_system
                  in: path
                  description: ranking system
                  required: true
                  schema:
                    type: string
                    enum:
                        - MAIN
                        - WOMEN
                        - YOUTH
                - name: type
                  in: path
                  description: type of result. active, nonactive, inactive
                  required: true
                  schema:
                    type: string
                    enum:
                        - ACTIVE
                        - NONACTIVE
                        - INACTIVE
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                properties:
                                    player_id:
                                        type: number
                                        example: 4
                                    results_type:
                                        type: string
                                        example: ACTIVE
                                    results_count:
                                        type: number
                                        example: 15
                                    system:
                                        type: string
                                        example: MAIN
                                    results:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                tournament_name:
                                                    type: string
                                                    example: IFPA World Pinball Championships
                                                tournament_id:
                                                    type: number
                                                    example: 1001
                                                    x-go-type: types.StringInt
                                                event_name:
                                                    type: string
                                                    example: Main Tournament
                                                event_date:
                                                    type: string
                                                    example: 2024-01-01T00:00:00.000Z
                                                country_name:
                                                    type: string
                                                    example: United States
                                                country_code:
                                                    type: string
                                                    example: US
                                                position:
                                                    type: number
                                                    example: 2
                                                    x-go-type: types.StringInt
                                                original_points:
                                                    type: number
                                                    example: 123.45
                                                    x-go-type: types.StringFloat64
                                                current_points:
                                                    type: number
                                                    example: 75.15
                                                    x-go-type: types.StringFloat64
                                    rank_type:
                                        type: string
                                        example: MAIN
                "400":
                    description: Invalid Player ID or Rank System provided
                    content: {}
                "404":
                    description: Cannot find player or ranking system data
                    content: {}
