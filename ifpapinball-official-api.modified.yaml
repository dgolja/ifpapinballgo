    /tournament/search:
        get:
            tags:
                - tournament
            summary: Search for Tournaments or Leagues
            description: Returns information about tournaments and leagues based on the parameters provided
            operationId: tourSearch
            parameters:
                - name: name
                  in: query
                  description: Search based on text string against Tournament Names
                  schema:
                    type: string
                  required: false
                - name: country
                  in: query
                  description: Search based on the Country of the Tournament
                  schema:
                    type: string
                  required: false
                - name: stateprov
                  in: query
                  description: Search based on the State/Provience/Region of the Tournament
                  schema:
                    type: string
                  required: false
                - name: start_date
                  in: query
                  description: Narrow search to only include results beyond a date. If not provided, today's date is used
                  schema:
                    type: string
                    format: YYYY-MM-DD
                  required: false
                - name: end_date
                  in: query
                  description: Narrow search to only include results up to a certain date
                  schema:
                    type: string
                    format: YYYY-MM-DD
                  required: false
                - name: rank_type
                  in: query
                  description: Search only calendar entries for specific ranking systems
                  schema:
                    type: string
                    enum:
                        - MAIN
                        - WOMEN
                  required: false
                - name: event_type
                  in: query
                  description: Search only calendar entries for specific event type
                  schema:
                    type: string
                    enum:
                        - Tournament
                        - Keague
                  required: false
                - name: start_pos
                  in: query
                  description: Start a specific position in the list that is returned. Default is position
                  schema:
                    type: integer
                  required: false
                - name: total
                  in: query
                  description: Total number of calendar entries to return
                  schema:
                    maximum: 250
                    minimum: 1
                    type: integer
                    default: 50
                  required: false
                - name: director_name
                  in: query
                  description: Narrow search to only include tournaments for a particular director
                  schema:
                    type: string
                  required: false
                - name: pre_registration
                  in: query
                  description: Narrow search to only include tournaments that requires preregistration
                  schema:
                    type: string
                    enum:
                        - Y
                        - N
                  required: false
                - name: only_with_results
                  in: query
                  description: Narrow search to only include tournaments that have submitted results
                  schema:
                    type: string
                    enum:
                        - Y
                        - N
                  required: false
                - name: latitude
                  in: query
                  description: Narrow search to a region, based on latitude and longitude with radius and distance unit
                  schema:
                    type: string
                  required: false
                - name: longitude
                  in: query
                  description: Narrow search to a region, based on latitude and longitude with radius and distance unit
