openapi: 3.0.1
info:
    title: IFPA API
    description: "This API allows you to extra data out of the IFPA Database and contains information about Players, Tournaments and Rankings\n ### If you are using /v1 or /v2 endpoints, please switch to the current endpoints. These versions are no longer supported or updated.\n ### Release Notes (2.1) : \n\t- 2025-08-11 - Updated tournament /results and /{id} info to reflect correct fields\n\t- 2025-08-01 - Updated this document to OpenAPI 3 \n\t- 2025-08-01 - Added missing fields and structures\n\t- 2025-08-01 - Added logic to better support upper and lower case with attributes that are passed."
    contact:
        email: ifpapinball@gmail.com
    version: "2.1"
servers:
    - url: https://api.ifpapinball.com/
security:
    - API_KEY: []
paths:
    /director/{id}:
        get:
            tags:
                - director
            summary: Get information about Tournament Directors
            description: Returns data about Tournament Directors
            operationId: viewDirector
            parameters:
                - name: id
                  in: path
                  description: ID of the Director
                  required: true
                  schema:
                    type: number
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                properties:
                                    name:
                                        type: string
                                        example: Josh Sharpe
                                    profile_photo:
                                        type: string
                                        example: https://www.ifpapinball.com/images/profiles/directors/1000.jpg
                                    director_id:
                                        type: number
                                        example: 1000
                                        x-go-type: types.StringInt
                                    city:
                                        type: string
                                        example: Chicago
                                    stateprov:
                                        type: string
                                        example: IL
                                    country_name:
                                        type: string
                                        example: United States
                                    country_code:
                                        type: string
                                        example: US
                                    country_id:
                                        type: number
                                        example: 168
                                        x-go-type: types.StringInt
                                    twitch_username:
                                        type: string
                                        example: jsharpe
                                    stats:
                                        type: object
                                        properties:
                                            tournament_count:
                                                type: number
                                                example: 1
                                                x-go-type: types.StringInt
                                            unique_location_count:
                                                type: number
                                                example: 1
                                                x-go-type: types.StringInt
                                            women_tournament_count:
                                                type: number
                                                example: 2
                                                x-go-type: types.StringInt
                                            league_count:
                                                type: number
                                                example: 3
                                                x-go-type: types.StringInt
                                            highest_value:
                                                type: number
                                                example: 141
                                                x-go-type: types.StringFloat64
                                            average_value:
                                                type: number
                                                example: 22
                                                x-go-type: types.StringFloat64
                                            total_player_count:
                                                type: number
                                                example: 241
                                                x-go-type: types.StringInt
                                            unique_player_count:
                                                type: number
                                                example: 123
                                                x-go-type: types.StringInt
                                            first_time_player_count:
                                                type: number
                                                example: 100
                                                x-go-type: types.StringInt
                                            repeat_player_count:
                                                type: number
                                                example: 123
                                                x-go-type: types.StringInt
                                            largest_event_count:
                                                type: number
                                                example: 210
                                                x-go-type: types.StringInt
                                            single_format_count:
                                                type: number
                                                example: 10
                                                x-go-type: types.StringInt
                                            multiple_format_count:
                                                type: number
                                                example: 7
                                                x-go-type: types.StringInt
                                            unknown_format_count:
                                                type: number
                                                example: 21
                                                x-go-type: types.StringInt
                                            formats:
                                                type: array
                                                items:
                                                    type: object
                                                    properties:
                                                        name:
                                                            type: string
                                                            example: Strike Knockout
                                                        count:
                                                            type: number
                                                            example: 15
                                                            x-go-type: types.StringInt
                                    default_tournament_photo:
                                        type: string
                                        example: https://www.ifpapinball.com/images/ifpa_gray.jpg
                                    player_id:
                                        type: number
                                        nullable: true
                                        x-go-type: types.StringInt
                "400":
                    description: Invalid Director ID provided
                    content: {}
                "404":
                    description: Cannot find a director with the provided ID
                    content: {}
    /director/{id}/tournaments/{time_period}:
        get:
            tags:
                - director
            summary: Get information about past or future tournaments for a director
            description: Get information about past or future tournaments for a director
            operationId: viewDirectorTours
            parameters:
                - name: id
                  in: path
                  description: ID of the director
                  required: true
                  schema:
                    type: number
                - name: time_period
                  in: path
                  description: Past or Future tournaments (past, future)
                  required: true
                  schema:
                    type: string
                    enum:
                        - PAST
                        - FUTURE
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    director_id:
                                        type: number
                                        example: 1000
                                        x-go-type: types.StringInt
                                    tournament_count:
                                        type: number
                                        example: 45
                                    tournaments:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                tournament_id:
                                                    type: number
                                                    example: 15161
                                                    x-go-type: types.StringInt
                                                tournament_name:
                                                    type: string
                                                    example: IFPA World Championships
                                                event_name:
                                                    type: string
                                                    example: Main Tournament
                                                ranking_system:
                                                    type: string
                                                    example: MAIN
                                                city:
                                                    type: string
                                                    example: Denver
                                                stateprov_code:
                                                    type: string
                                                    example: CO
                                                country_code:
                                                    type: string
                                                    example: US
                                                country_name:
                                                    type: string
                                                    example: United States
                                                event_start_date:
                                                    type: string
                                                    example: 2024-05-01T00:00:00.000Z
                                                event_end_date:
                                                    type: string
                                                    example: 2024-05-01T00:00:00.000Z
                                                qualifying_format:
                                                    type: string
                                                    example: Matchplay
                                                finals_format:
                                                    type: string
                                                    example: Single Elimination
                                                player_count:
                                                    type: number
                                                    example: 80
                                                    x-go-type: types.StringInt
                "400":
                    description: Invalid Director ID provided
                    content: {}
                "404":
                    description: Cannot find a director with the provided ID
                    content: {}
    /director/country:
        get:
            tags:
                - director
            summary: Get a list of players who are country directors for the IFPA
            description: Get a list of players who are country directors for the IFPA
            operationId: viewCountryDirectors
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                properties:
                                    count:
                                        type: number
                                        example: 22
                                    country_directors:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                player_profile:
                                                    type: object
                                                    properties:
                                                        player_id:
                                                            type: number
                                                            example: 4
                                                            x-go-type: types.StringInt
                                                        name:
                                                            type: string
                                                            example: Josh Sharpe
                                                        country_code:
                                                            type: string
                                                            example: US
                                                        country_name:
                                                            type: string
                                                            example: United States
                                                        profile_photo:
                                                            type: string
                                                            example: https://www.ifpapinball.com/images/profiles/player/4.jpg
    /director/search:
        get:
            tags:
                - director
            summary: Search for Directors by Name
            description: Search for Directors by Name
            operationId: searchDirectors
            parameters:
                - name: name
                  in: query
                  description: Name of the Director (not case sensitive)
                  schema:
                    type: string
                  required: false
                - name: count
                  in: query
                  description: Number of results to return (default = 50)
                  schema:
                    type: integer
                  required: false
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                properties:
                                    search_term:
                                        type: string
                                        example: sharpe
                                    count:
                                        type: number
                                        example: 22
                                    directors:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                director_id:
                                                    type: number
                                                    example: 4
                                                    x-go-type: types.StringInt
                                                name:
                                                    type: string
                                                    example: Josh Sharpe
                                                city:
                                                    type: string
                                                    example: Chicago
                                                stateprov:
                                                    type: string
                                                    example: IL
                                                country_name:
                                                    type: string
                                                    example: United States
                                                country_code:
                                                    type: string
                                                    example: US
                                                profile_photo:
                                                    type: string
                                                    example: https://www.ifpapinball.com/images/profiles/player/4.jpg
                                                stats:
                                                    type: object
                                                    properties:
                                                        event_count:
                                                            type: number
                                                            example: 5
                                                            x-go-type: types.StringInt
                                                        future_event_count:
                                                            type: number
                                                            example: 125
                                                            x-go-type: types.StringInt
                                                        unique_player_count:
                                                            type: number
                                                            example: 125
                                                            x-go-type: types.StringInt
                                                        total_player_count:
                                                            type: string
                                                            example: 456
                                                            x-go-type: types.StringInt
                                                        last_event_date:
                                                            type: string
                                                            example: 2024-01-01T00:00:00.000Z
    /other/countries:
        get:
            tags:
                - other
            summary: Get a list of Countries that can referenced by IFPA data
            description: Get a list of Countries that can referenced by IFPA data
            operationId: otherCountries
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    country:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                country_id:
                                                    type: number
                                                    example: 168
                                                    x-go-type: types.StringInt
                                                country_name:
                                                    type: string
                                                    example: United States
                                                country_code:
                                                    type: string
                                                    example: US
                                                active_flag:
                                                    type: string
                                                    example: Y
    /other/stateprovs:
        get:
            tags:
                - other
            summary: Get a list of States and Provinces that can referenced by IFPA data
            description: Get a list of States and Provinces that can referenced by IFPA data  (US, Canada and Australia only)
            operationId: otherStateProv
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    stateprov:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                country_id:
                                                    type: number
                                                    example: 168
                                                    x-go-type: types.StringInt
                                                country_name:
                                                    type: string
                                                    example: United States
                                                country_code:
                                                    type: string
                                                    example: US
                                                regions:
                                                    type: array
                                                    items:
                                                        type: object
                                                        properties:
                                                            region_name:
                                                                type: string
                                                                example: Ohio
                                                            region_code:
