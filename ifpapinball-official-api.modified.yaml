            description: Returns PVP records against other players
            operationId: viewPlayerPVP
            parameters:
                - name: id
                  in: path
                  description: ID of the player
                  required: true
                  schema:
                    type: number
            responses:
                "200":
                    description: successful operation
                    content:
                        application/json:
                            schema:
                                properties:
                                    player_id:
                                        type: number
                                        example: 4
                                    total_competitors:
                                        type: number
                                        example: 1011
                                    system:
                                        type: string
                                        example: MAIN
                                    pvp:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                player_id:
                                                    type: number
                                                    example: 7
